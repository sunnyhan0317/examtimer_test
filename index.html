<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>exam timer</title>
	<meta name="viewport" content="width=device-width, initial-scale= 1.0">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&family=LXGW+WenKai+Mono+TC&display=swap"
		rel="stylesheet">

	<style>
		* {
			box-sizing: border-box;
		}

		h1 {
			font-size: 200%;
			font-weight: bold;
		}

		h1,
		h2 {
			text-align: center;
		}

		#schedule_j_container,
		#schedule_s_container {
			display: none;
			padding: 15px;
			background-color: #fffbf7;
			border-radius: 8px;
			min-height: 250px;
		}

		.schedule-label {
			font-weight: bold;
			font-size: 120%;
			margin-bottom: 10px;
			color: #333;
		}

		#schedule_j,
		#schedule_s {
			font-size: 18px;
			font-weight: bold;
			line-height: 1.8;
		}

		.course-item {
			padding: 8px 12px;
			margin-bottom: 8px;
			border-radius: 4px;
			transition: all 0.3s ease;
		}

		.course-item:hover {
			background-color: #f0f0f0;
		}

		.course-current {
			background-color: #ffffff;
			border: 3px solid #4CAF50;
			box-shadow: 0 0 8px rgba(76, 175, 80, 0.3);
		}

		.course-completed {
			opacity: 0.6;
		}

		aside {
			padding: 15px;
			background-color: #fffbf7;
			border-radius: 8px;
			text-align: center;
		}

		#count_down,
		#arrive_subject {
			color: #3C3C3C;
			font-size: 350%;
			margin: 10px 0;
			font-weight: bold;
			line-height: 1.2;
		}

		.controls {
			margin: 15px 0;
			padding: 15px;
			background-color: #fff9f5;
			border-radius: 8px;
		}

		.add {
			font-size: 100%;
			margin: 15px 0;
		}

		input[type="text"],
		input[type="time"],
		select {
			padding: 8px 12px;
			margin: 5px 10px 5px 0;
			border: 1px solid #ddd;
			border-radius: 4px;
			font-family: "LXGW WenKai Mono TC", monospace;
		}

		select {
			width: auto;
		}

		input[type="text"],
		input[type="time"] {
			width: 150px;
		}

		button {
			padding: 8px 16px;
			background-color: #4CAF50;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-family: "LXGW WenKai Mono TC", monospace;
			font-weight: bold;
			transition: background-color 0.3s;
		}

		button:hover {
			background-color: #45a049;
		}

		button.danger {
			background-color: #f44336;
		}

		button.danger:hover {
			background-color: #da190b;
		}

		#current_time {
			font-size: 120%;
			text-align: center;
			margin-bottom: 15px;
			font-weight: bold;
		}

		body {
			background-color: #fff5ee;
			font-family: "LXGW WenKai Mono TC", monospace;
		}

		footer {
			text-align: center;
			margin-top: 30px;
			padding: 15px;
		}

		#output:fullscreen {
			display: block;
			justify-content: center;
			align-items: center;
			text-align: center;
			background-color: #fff5ee;
		}

		/* Modal styles */
		.modal {
			display: none;
			position: fixed;
			z-index: 1000;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0.5);
		}

		.modal-content {
			background-color: #fff5ee;
			margin: 10% auto;
			padding: 25px;
			border: 1px solid #888;
			border-radius: 8px;
			width: 90%;
			max-width: 500px;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
		}

		.modal-header {
			font-size: 24px;
			font-weight: bold;
			margin-bottom: 20px;
			color: #333;
		}

		.modal-body {
			margin-bottom: 20px;
		}

		.form-group {
			margin-bottom: 15px;
		}

		.form-group label {
			display: block;
			margin-bottom: 5px;
			font-weight: bold;
			color: #333;
		}

		.form-group input,
		.form-group select {
			width: 100%;
			padding: 10px;
			border: 1px solid #ddd;
			border-radius: 4px;
			font-family: "LXGW WenKai Mono TC", monospace;
		}

		.checkbox-group {
			display: flex;
			gap: 20px;
			margin-top: 8px;
		}

		.checkbox-group label {
			display: flex;
			align-items: center;
			margin: 0;
		}

		.checkbox-group input {
			width: auto;
			margin-right: 8px;
		}

		.modal-buttons {
			display: flex;
			gap: 10px;
			justify-content: flex-end;
		}

		.modal-buttons button {
			flex: 1;
		}

		.add_seat {
			margin-top: 20px;
		}

		#preview {
			max-width: 100%;
			max-height: 300px;
			margin-top: 10px;
			border-radius: 4px;
		}

		@media (max-width: 768px) {
			#count_down,
			#arrive_subject {
				font-size: 200%;
			}

			#schedule_j_container,
			#schedule_s_container {
				margin-bottom: 20px;
			}

			input[type="text"],
			input[type="time"] {
				width: 100%;
				margin: 5px 0;
			}
		}
	</style>
</head>

<body>
	<h1><a href="https://sunnyhan0317.github.io/2024/10/28/Exam-Timer/" target="_blank"
			style="color:black; margin-left: 3%;" class="text-decoration-none">Exam Timer</a></h1>
	
	<div id="output">
		<div id="current_time"></div>

		<div class="container-fluid">
			<div class="row">
				<!-- Schedule containers -->
				<div class="col-lg-8">
					<div class="row">
						<div class="col-md-6">
							<div id="schedule_j_container">
								<div class="schedule-label" id="schedule_j_label">年級 A</div>
								<div id="schedule_j"></div>
							</div>
						</div>
						<div class="col-md-6">
							<div id="schedule_s_container">
								<div class="schedule-label" id="schedule_s_label">年級 B</div>
								<div id="schedule_s"></div>
							</div>
						</div>
					</div>
				</div>

				<!-- Countdown and current subject -->
				<div class="col-lg-4">
					<aside>
						<h2 id="arrive_subject"></h2>
						<h2 id="count_down"></h2>
					</aside>
				</div>
			</div>
		</div>
	</div>

	<br>

	<!-- Controls section -->
	<div class="controls">
		<div style="margin-bottom: 15px;">
			<button id="fullscreen_btn">全屏</button>
		</div>

		<div style="margin-bottom: 15px;">
			<label>國中年級：</label>
			<select id="select_grade_j">
				<option value="none_j">-選擇-</option>
				<option value="j1">國一</option>
				<option value="j2">國二</option>
				<option value="j3">國三</option>
			</select>

			<label style="margin-left: 20px;">高中年級：</label>
			<select id="select_grade_s">
				<option value="none_s">-選擇-</option>
				<option value="s1_science">高一[自]</option>
				<option value="s1_social">高一[社]</option>
				<option value="s2_science">高二[自]</option>
				<option value="s2_social">高二[社]</option>
				<option value="s3_science">高三[自]</option>
				<option value="s3_social">高三[社]</option>
			</select>
		</div>

		<div>
			<button id="add_subject" onclick="open_input()">手動新增科目</button>
		</div>

		<div id="add" style="display: none; margin-top: 15px; padding: 15px; background-color: #fffbf7; border-radius: 8px;">
			<div class="form-group">
				<label>科目 1：</label>
				<input type="text" id="subject" placeholder="輸入科目名稱">
			</div>

			<div class="form-group">
				<label>科目 2：</label>
				<input type="text" id="subject2" placeholder="若有不同組才需填">
			</div>

			<div class="form-group">
				<label>是否轉班：</label>
				<div class="checkbox-group">
					<label><input type="checkbox" id="change_class_yes" class="change_class"> 是</label>
					<label><input type="checkbox" id="change_class_no" class="change_class"> 否</label>
				</div>
			</div>

			<div class="form-group">
				<label>開始時間：</label>
				<input type="time" id="start_time">
			</div>

			<div class="form-group">
				<label>結束時間：</label>
				<input type="time" id="end_time">
			</div>

			<button onclick="add_course_manually()">保存</button>
		</div>
	</div>

	<br>

	<!-- Seat upload section -->
	<div class="controls add_seat">
		<label>上傳座位表：</label>
		<input type="file" id="fileInput" accept="image/*">
		<button id='seat_delete' style="background-color: #f44336; display: none;" onclick="delete_photo()">刪除</button>
		<div style="margin-top: 15px;">
			<img id="preview" src="">
		</div>
	</div>

	<br>

	<!-- Edit Modal -->
	<div id="editModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">編輯科目</div>
			<div class="modal-body">
				<div class="form-group">
					<label>科目 1：</label>
					<input type="text" id="edit_subject" placeholder="輸入科目名稱">
				</div>

				<div class="form-group">
					<label>科目 2：</label>
					<input type="text" id="edit_subject2" placeholder="若有不同組才需填">
				</div>

				<div class="form-group">
					<label>開始時間：</label>
					<input type="time" id="edit_start_time">
				</div>

				<div class="form-group">
					<label>結束時間：</label>
					<input type="time" id="edit_end_time">
				</div>

				<div class="form-group">
					<label>是否轉班：</label>
					<div class="checkbox-group">
						<label><input type="checkbox" id="edit_change_class_yes" class="edit_change_class"> 是</label>
						<label><input type="checkbox" id="edit_change_class_no" class="edit_change_class"> 否</label>
					</div>
				</div>
			</div>

			<div class="modal-buttons">
				<button class="danger" onclick="deleteEditCourse()">刪除</button>
				<button onclick="closeEditModal()">取消</button>
				<button onclick="saveEditCourse()">保存</button>
			</div>
		</div>
	</div>

	<footer>
		<small>
			© 2026 Sunny Han.
		</small>
	</footer>

	<script src="run.js"></script>

</body>

</html>
