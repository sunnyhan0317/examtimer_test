<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>exam timer</title>
	<meta name="viewport" content="width=device-width, initial-scale= 1.0">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&family=LXGW+WenKai+Mono+TC&display=swap"
		rel="stylesheet">

	<style>
		h1 {
			font-size: 200%;
			font-weight: bold;
		}

		h1,
		h2 {
			text-align: center;
		}

		#schedule {
			font-size: 220%;
			font-weight: bold;
			margin-top: 7%;
			margin-left: 15%;
			line-height: 0.75;
		}

		aside {
			float: right;
			padding: 10px;
			margin-right: 15%;
		}

		#count_down,
		#arrive_subject {
			color: #3C3C3C;
			font-size: 400%;
			margin-top: 5%;
			font-weight: bold;
		}

		.add {
			font-size: 100%;
			margin-left: 3%;

		}

		input {
			width: 100px;
			height: 20px;
		}

		#current_time {
			font-size: 1300%;
			top: 5%;
			right: 5%;
			text-align: center;
			margin-bottom: 5%;
		}

		body {
			background-color: #fff5ee;
			font-family: "LXGW WenKai Mono TC", monospace;
		}

		footer {
			text-align: center;
			position: relative;
			bottom: 0;
			width: 100%;
			height: 2.5rem;
			margin-top: auto;
		}

		#output:fullscreen {
			display: block;
			justify-content: center;
			align-items: center;
			text-align: center;
			background-color: #fff5ee;
		}

		/* 課程項目樣式 */
		.course-item {
			cursor: pointer;
			padding: 5px;
			margin: 3px 0;
			transition: all 0.3s ease;
			display: block;
		}

		.course-item:hover {
			opacity: 0.8;
		}

		.course-current {
			background-color: #ffffff;
			border: 2px solid #4CAF50;
			padding: 5px;
		}

		/* 編輯模態框樣式 */
		.modal {
			display: none;
			position: fixed;
			z-index: 1000;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			overflow: auto;
			background-color: rgba(0, 0, 0, 0.4);
		}

		.modal-content {
			background-color: #fefefe;
			margin: 15% auto;
			padding: 20px;
			border: 1px solid #888;
			width: 80%;
			max-width: 500px;
			border-radius: 8px;
		}

		.modal-header {
			font-size: 18px;
			font-weight: bold;
			margin-bottom: 15px;
		}

		.modal-buttons {
			margin-top: 20px;
			text-align: right;
		}

		.modal-buttons button {
			margin-left: 10px;
			padding: 8px 15px;
			background-color: #4CAF50;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
		}

		.modal-buttons button.danger {
			background-color: #f44336;
		}

		.modal-buttons button.cancel {
			background-color: #888;
		}

		.modal-buttons button:hover {
			opacity: 0.8;
		}

		.form-group {
			margin-bottom: 12px;
		}

		.form-group label {
			display: block;
			margin-bottom: 5px;
			font-weight: bold;
		}

		.form-group input,
		.form-group select {
			width: 100%;
			padding: 6px;
			border: 1px solid #ddd;
			border-radius: 4px;
			font-family: "LXGW WenKai Mono TC", monospace;
		}

		.checkbox-group {
			display: flex;
			gap: 15px;
			margin-top: 5px;
		}

		.checkbox-group label {
			display: flex;
			align-items: center;
			margin: 0;
		}

		.checkbox-group input {
			width: auto;
			margin-right: 5px;
		}
	</style>
	<script>
		// current time show
		var i = 0;
		function currentTime() {
			var now = new Date();
			var hours = now.getHours();
			var minutes = now.getMinutes();
			var seconds = now.getSeconds();

			if (hours < 10) hours = '0' + hours;
			if (minutes < 10) minutes = '0' + minutes;
			if (seconds < 10) seconds = '0' + seconds;

			document.getElementById("current_time").innerHTML = hours + "：" + minutes + "：" + seconds;
		}
		setInterval(currentTime, 1000);
	</script>
</head>

<body>
	<h1><a href="https://sunnyhan0317.github.io/2024/10/28/Exam-Timer/" target="_blank"
			style="color:black; margin-left: 3%;" class="text-decoration-none">Exam Timer</a></h1>
	<div id="output">
		<p id="current_time" style="margin-bottom: 0%;"></p>
		<div class="container">
			<div class="row">
				<div class="col-md-6">
					<div class="img-thumbnail" style=" background-color: #fff5ee; margin-top: 0;">
						<p id="schedule" style="margin-left: 6%; text-align: left; margin-top: 2%;"></p>
					</div>
				</div>
				<div class="col-md-6">
					<div class="img-thumbnail" style=" background-color: #fff5ee; text-align: center;">
						<h2 id="arrive_subject"></h2>
						<h2 id="count_down"></h2>
					</div>
				</div>
			</div>
		</div>
	</div>
	<br>
	<br>
	<br>
	<button id="fullscreen_btn" style="margin-left: 3%;">FS</button>
	<br>
	<br>
	<select id="select_grade_type" style="margin-left: 3%;">
		<option value="none">-選擇年級-</option>
		<option value="junior">Junior</option>
		<option value="senior">Senior</option>
	</select>
	<br>
	<br>
	<label style="margin-left: 3%;">班級 1：</label>
	<select id="select_class_1" style="margin-left: 3%;">
		<option value="none">-選擇班級-</option>
	</select>
	<label style="margin-left: 3%;">班級 2：</label>
	<select id="select_class_2" style="margin-left: 3%;">
		<option value="none">-選擇班級-</option>
	</select>
	<br>
	<br>
	<button id="add_subject" onclick="open_input()" style="margin-left: 3%;">add subject</button>
	<div id="add" style="display: none; margin-left: 5%;">
		<br>
		<p>Subject 1: <input type="text" id="subject"></p>

		<p>Subject 2: <input type="text" id="subject2"><br>(若有不同組才需填) </p>


		<p>Change Class: <br>
			<input type="checkbox" id="change_class_yes" class="change_class">Yes <input type="checkbox" id="change_class_no" class="change_class">No
		</p>

		<p>Start time: <input type="time" id="start_time"></p>

		<p>End time: <input type="time" id="end_time"></p>

		<button onclick="add_course_manually()">Save</button>
	</div>

	<br>
	<br>

	<div class="add_seat" style="margin-left: 3%; margin-top: 2%; text-align: center;">
		<p style="text-align: left;">Upload Seat <input type="file" id="fileInput" style="height: auto;" accept="image/*"></p> 
		<br>
		<button id='seat_delete' style="color: red; display: none; text-align: left;" onclick="delete_photo()">Delete</button>
		<img id="preview" src="" style="max-width: 80%; max-height: 80%;">
	</div>

	<br>

	<!-- 編輯科目模態框 -->
	<div id="editModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">編輯科目</div>
			<div class="form-group">
				<label>科目 1：</label>
				<input type="text" id="edit_subject">
			</div>

			<div class="form-group">
				<label>科目 2：</label>
				<input type="text" id="edit_subject2">
			</div>

			<div class="form-group">
				<label>開始時間：</label>
				<input type="time" id="edit_start_time">
			</div>

			<div class="form-group">
				<label>結束時間：</label>
				<input type="time" id="edit_end_time">
			</div>

			<div class="form-group">
				<label>是否轉班：</label>
				<div class="checkbox-group">
					<label><input type="checkbox" id="edit_change_class_yes" class="edit_change_class"> 是</label>
					<label><input type="checkbox" id="edit_change_class_no" class="edit_change_class"> 否</label>
				</div>
			</div>

			<div class="modal-buttons">
				<button class="danger" onclick="deleteEditCourse()">刪除</button>
				<button class="cancel" onclick="closeEditModal()">取消</button>
				<button onclick="saveEditCourse()">保存</button>
			</div>
		</div>
	</div>

	<footer>
		<small>
			© 2026 Sunny Han.
		</small>
	</footer>

	<script src="run.js"></script>

</body>

</html>
